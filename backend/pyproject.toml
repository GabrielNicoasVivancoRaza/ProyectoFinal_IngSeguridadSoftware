[tool.ruff]
line-length = 100
target-version = "py311"
# Las migraciones son autogeneradas por Alembic; no se lintean.
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
# B008: Depends() en argumentos por defecto es el patron idiomatico de FastAPI.
ignore = ["B008"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
