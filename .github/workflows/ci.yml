name: CI DevSecOps

# Integracion continua: se ejecuta en cada push y pull request a main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --- Calidad de codigo ---
      - name: Lint (ruff)
        run: ruff check .

      # --- Pruebas automaticas ---
      - name: Pruebas (pytest)
        run: pytest -q

      # --- Escaneo de seguridad estatico (SAST) ---
      - name: Analisis de seguridad (Bandit)
        run: bandit -r app -ll

      # --- Vulnerabilidades en dependencias ---
      # Informativo: no rompe el build en etapas tempranas del proyecto.
      - name: Auditoria de dependencias (pip-audit)
        continue-on-error: true
        run: pip-audit

  # ==================================================================
  # Escaneo de la imagen Docker con Trivy (vulnerabilidades del contenedor)
  # ==================================================================
  docker-scan:
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Construir la imagen del backend
        run: docker build -t firma-backend:${{ github.sha }} ./backend

      - name: Escaneo de vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: firma-backend:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          # Informativo por ahora: no rompe el build.
          # Cambiar a '1' para bloquear ante vulnerabilidades HIGH/CRITICAL.
          exit-code: "0"
